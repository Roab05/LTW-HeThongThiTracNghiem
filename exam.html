<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài thi - PTIT</title>
    <link rel="stylesheet" href="css/exam.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="exam-container">
        <header class="exam-header">
            <div class="logo-area">
                <img src="ptit_logo.png" alt="PTIT Logo">
            </div>
            <div class="title-area">
                <h2>Bài thi: Kiểm tra cuối kì II năm 2025 - 2026</h2>
                <h3>Môn học: Triết học Mác - Lênin</h3>
            </div>
            <div class="timer-area">
                <div class="timer-label">Thời gian còn lại</div>
                <div class="timer-countdown" id="countdown">30 : 25</div>
            </div>
        </header>

        <main class="exam-main">
            <section class="questions-section" id="questions-container">
                </section>

            <aside class="sidebar-right">
                <div class="nav-card">
                    <h3 class="nav-title">Danh sách<br>câu hỏi</h3>
                    <div class="grid-container" id="question-grid">
                        </div>
                    
                    <button class="btn-submit" onclick="submitExam()">Nộp bài</button>
                </div>
            </aside>
        </main>
    </div>

    <div id="submit-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Xác nhận nộp bài</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Bạn có chắc chắn muốn nộp bài thi không?</p>
                <p class="modal-warning">Lưu ý: Sau khi nộp sẽ không thể quay lại để sửa bài làm.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn-confirm" onclick="confirmSubmit()">Đồng ý nộp</button>
            </div>
        </div>
    </div>

    <script src="js/exam.js"></script>
</body>
</html>
