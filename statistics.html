<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê & Báo cáo - Admin PTIT</title>
    <link rel="stylesheet" href="css/statistics.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="stats-container">
        <header class="top-header">
            <div class="logo-area">
                <a href="admin_dashboard.html">
                    <img src="ptit_logo.png" alt="PTIT Logo">
                </a>
                <h2>Quản trị Hệ thống</h2>
            </div>
            <div class="action-area">
                <button class="btn-back" onclick="window.location.href='admin_dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Quay lại Dashboard
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="page-title">
                <h2><i class="fas fa-chart-line"></i> Báo cáo & Thống kê kết quả thi</h2>
                <div class="export-actions">
                    <button class="btn-export excel" onclick="exportData('Excel')">
                        <i class="fas fa-file-excel"></i> Xuất Excel
                    </button>
                    <button class="btn-export pdf" onclick="exportData('PDF')">
                        <i class="fas fa-file-pdf"></i> Xuất PDF
                    </button>
                </div>
            </div>

            <section class="filter-section card-panel">
                <div class="filter-group">
                    <label>Kỳ thi:</label>
                    <select id="filter-exam" class="form-control">
                        <option value="all">-- Tất cả kỳ thi --</option>
                        <option value="Triết học">Kiểm tra cuối kì - Triết học</option>
                        <option value="C++">Kiểm tra giữa kì - Lập trình C++</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Từ ngày:</label>
                    <input type="date" id="filter-date-start" class="form-control">
                </div>
                <div class="filter-group">
                    <label>Đến ngày:</label>
                    <input type="date" id="filter-date-end" class="form-control">
                </div>
                <div class="filter-group">
                    <label>&nbsp;</label>
                    <button class="btn-filter" onclick="applyFilter()">
                        <i class="fas fa-filter"></i> Lọc dữ liệu
                    </button>
                </div>
            </section>

            <div class="content-grid">
                <div class="summary-column">
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: #e3f2fd; color: #1976d2;"><i class="fas fa-users"></i></div>
                        <div class="stat-info">
                            <h3>Lượt tham gia</h3>
                            <p id="total-participants">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: #e8f5e9; color: #388e3c;"><i class="fas fa-check-double"></i></div>
                        <div class="stat-info">
                            <h3>Tỷ lệ hoàn thành</h3>
                            <p id="completion-rate">0%</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: #fff3e0; color: #f57c00;"><i class="fas fa-star-half-alt"></i></div>
                        <div class="stat-info">
                            <h3>Điểm trung bình</h3>
                            <p id="average-score">0.0</p>
                        </div>
                    </div>
                </div>

                <div class="chart-column card-panel">
                    <h3 class="panel-title">Phân phối điểm số</h3>
                    <div class="chart-wrapper">
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>
            </div>

            <section class="table-section card-panel">
                <h3 class="panel-title">Bảng kết quả chi tiết</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Mã SV</th>
                            <th>Họ và Tên</th>
                            <th>Kỳ thi</th>
                            <th>Ngày nộp</th>
                            <th>Điểm số</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="result-table-body">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/statistics.js"></script>
</body>
</html>
